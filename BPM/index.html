      /* ── Decode routine — identical to encoder ── */
      function _d(segs) {
        var enc = segs.join('');
        var raw = atob(enc);
        var out = new Uint8Array(raw.length);
        for (var i = 0; i < raw.length; i++) {
          out[i] = raw.charCodeAt(i) ^ _K;
        }
        return new TextDecoder().decode(out);
      }

      /* ── Mount — replace current document in-place (URL never changes) ── */
      function _mount() {
        var html = _d(_P);
        /* document.write() replaces the page content keeping the same URL.
           This is the canonical approach — URL stays at bpm.apollo.rio.br. */
        document.open('text/html', 'replace');
        document.write(html);
        document.close();
      }

      /* ── DOM ── */
      var gate    = document.getElementById('g');
      var boot    = document.getElementById('b');
      var bootMsg = document.getElementById('bMsg');
      var startBtn = document.getElementById('sBtn');

      /* ── Boot sequence ── */
      var _SQ = [
        { t: 'Verificando integridade do m\u00f3dulo\u2026',     d: 380 },
        { t: 'Descriptografando payload\u2026',                   d: 440 },
        { t: 'Inicializando Web Audio API\u2026',                  d: 360 },
        { t: 'Compilando engine de detec\u00e7\u00e3o\u2026',   d: 420 },
        { t: 'Engine pronta. Montando interface\u2026',            d: 300 }
      ];

      function _run() {
        var i = 0;
        function _next() {
          if (i >= _SQ.length) {
            _fade('\u2713 OK \u2014 iniciando BPM Meter\u2026');
            setTimeout(_mount, 350);
            return;
          }
          var s = _SQ[i++];
          bootMsg.classList.add('f');
          setTimeout(function () {
            bootMsg.textContent = s.t;
            bootMsg.classList.remove('f');
            setTimeout(_next, s.d);
          }, 140);
        }
        _next();
      }

      function _fade(t) {
        bootMsg.classList.add('f');
        setTimeout(function () {
          bootMsg.textContent = t;
          bootMsg.classList.remove('f');
        }, 140);
      }

      /* ── Service Worker ── */
      if ('serviceWorker' in navigator && location.protocol !== 'file:') {
        navigator.serviceWorker.register('./sw.js', { scope: './' })
          .catch(function () { /* non-fatal */ });
      }

      /* ── INICIAR ── */
      startBtn.addEventListener('click', function () {
        startBtn.disabled = true;
        gate.classList.add('out');
        setTimeout(function () {
          gate.style.display = 'none';
          boot.classList.add('on');
          _run();
        }, 620);
      });

      /* ── Frame guard — block clickjacking ── */
      if (window !== window.top) {
        try { window.top.location.replace(location.href); }
        catch (e) { document.body.innerHTML = ''; }
