<section class="dj-section" id="booking">
  <div class="dj-contact-inner">
    <div class="dj-contact-glow"></div>
    <h2>Booking <span style="color:var(--dj-primary)">&amp;</span> Contato</h2>
    <p class="dj-contact-sub">Booking · Press · Collabs</p>

    <form class="dj-booking-form" id="dj-booking-form">
      <div class="dj-form-row">
        <div class="input-group">
          <input class="apollo-input" type="text" placeholder=" " required>
          <label class="apollo-label">Nome / Agency</label>
        </div>
        <div class="input-group">
          <input class="apollo-input" type="email" placeholder=" " required>
          <label class="apollo-label">Email</label>
        </div>
      </div>
      <div class="input-group">
        <textarea class="apollo-input" rows="3" placeholder=" "></textarea>
        <label class="apollo-label">Mensagem</label>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">
        Enviar <i class="ri-arrow-right-line"></i>
      </button>
    </form>
  </div>
</section>
